<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sorteador de Números</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    #numero {
      font-size: 50px;
      margin: 20px 0;
      color: #333;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Sorteador (1 a 10)</h1>
    <div id="numero">?</div>
    <button onclick="sortear()">Sortear</button>
  </div>

    <div id="?"></div>
    <button onclick="limparResultado()">Limpar</button>
  </div>

  <script src = "sorteador.js"></script>


</body>
</html>
